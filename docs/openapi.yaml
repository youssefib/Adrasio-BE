openapi: 3.0.3

info:
  title: SuiMedrassa – School Management SaaS API
  version: 1.0.0
  description: |
    Multi-tenant school management platform.

    ## Authentication
    All protected endpoints require a **Bearer token** obtained from `POST /api/v1/auth/login`.
    Pass it as `Authorization: Bearer <token>`.

    ## Role legend
    | Role | Scope |
    |------|-------|
    | `system_admin` | Global – all schools |
    | `school_owner` | Own school |
    | `admin` | Own school (cannot delete school) |
    | `teacher` | Own school – read-only on most resources |
    | `student` | Own school – own data only |

    ## Tenant context
    For `system_admin` acting on a specific school, pass the `X-School-Id` header.
  contact:
    email: admin@suimedrassa.com

servers:
  - url: http://localhost:8000/api/v1
    description: Local development
  - url: https://api.suimedrassa.com/v1
    description: Production

tags:
  - name: Auth
    description: Registration, login, logout, password reset
  - name: Profile
    description: Authenticated user profile
  - name: System – Dashboard
    description: System-wide statistics (system_admin only)
  - name: System – Schools
    description: School management (system_admin only)
  - name: System – Subscription Plans
    description: Subscription plan CRUD (system_admin only)
  - name: System – Activity Logs
    description: Platform-wide audit log (system_admin only)
  - name: School – Profile
    description: Current school profile management
  - name: School – Dashboard
    description: School-level statistics
  - name: School – Users
    description: User management within a school
  - name: School – Students
    description: Student profiles and enrollment
  - name: School – Grades
    description: Grade/level management
  - name: School – Rooms
    description: Physical room management
  - name: School – Classes
    description: Classroom management and enrollment
  - name: School – Timetable
    description: Timetable/schedule management
  - name: School – Files
    description: File upload and access
  - name: School – Payments
    description: Monthly student payment tracking
  - name: School – Activity Logs
    description: School-scoped audit log

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Sanctum personal access token

  # ── Reusable parameters ───────────────────────────────────────────────────
  parameters:
    XSchoolId:
      name: X-School-Id
      in: header
      description: School ID override (system_admin only)
      required: false
      schema:
        type: integer
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        default: 25

  # ── Schemas ────────────────────────────────────────────────────────────────
  schemas:

    # Generic
    PaginationMeta:
      type: object
      properties:
        current_page: { type: integer }
        last_page:    { type: integer }
        per_page:     { type: integer }
        total:        { type: integer }

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        meta:
          $ref: '#/components/schemas/PaginationMeta'
        links:
          type: object

    ErrorResponse:
      type: object
      properties:
        message: { type: string }
        code:     { type: string }
      required: [message]

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "The given data was invalid."
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
      required: [message, errors]

    # ── Domain schemas ────────────────────────────────────────────────────────

    SubscriptionPlan:
      type: object
      properties:
        id:               { type: integer }
        name:             { type: string, example: "Standard" }
        slug:             { type: string, example: "standard" }
        description:      { type: string, nullable: true }
        max_students:     { type: integer, nullable: true }
        max_teachers:     { type: integer, nullable: true }
        max_classes:      { type: integer, nullable: true }
        storage_limit_mb: { type: integer }
        price_monthly:    { type: number, format: float }
        price_yearly:     { type: number, format: float }
        is_active:        { type: boolean }
        created_at:       { type: string, format: date-time }
        updated_at:       { type: string, format: date-time }

    School:
      type: object
      properties:
        id:                   { type: integer }
        name:                 { type: string, example: "Springfield High" }
        slug:                 { type: string }
        email:                { type: string, format: email }
        phone:                { type: string, nullable: true }
        address:              { type: string, nullable: true }
        city:                 { type: string, nullable: true }
        country:              { type: string, nullable: true }
        logo:                 { type: string, nullable: true }
        timezone:             { type: string, example: "UTC" }
        status:
          type: string
          enum: [active, suspended, trial, cancelled]
        subscription_tier:
          type: string
          enum: [trial, tier1, tier2, tier3]
        trial_ends_at:        { type: string, format: date-time, nullable: true }
        subscription_ends_at: { type: string, format: date-time, nullable: true }
        plan:
          $ref: '#/components/schemas/SubscriptionPlan'
        created_at:           { type: string, format: date-time }
        updated_at:           { type: string, format: date-time }

    UserRole:
      type: string
      enum: [system_admin, school_owner, admin, teacher, student]

    User:
      type: object
      properties:
        id:            { type: integer }
        school_id:     { type: integer, nullable: true }
        role:          { $ref: '#/components/schemas/UserRole' }
        name:          { type: string }
        email:         { type: string, format: email }
        phone:         { type: string, nullable: true }
        avatar:        { type: string, nullable: true }
        is_active:     { type: boolean }
        last_login_at: { type: string, format: date-time, nullable: true }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }

    StudentProfile:
      type: object
      properties:
        id:               { type: integer }
        user_id:          { type: integer }
        school_id:        { type: integer }
        enrollment_number:
          type: string
          example: "S10001"
        date_of_birth:    { type: string, format: date, nullable: true }
        guardian_name:    { type: string, nullable: true }
        guardian_phone:   { type: string, nullable: true }
        guardian_email:   { type: string, format: email, nullable: true }
        address:          { type: string, nullable: true }
        status:
          type: string
          enum: [active, inactive, graduated, suspended]
        user:
          $ref: '#/components/schemas/User'
        created_at:       { type: string, format: date-time }
        updated_at:       { type: string, format: date-time }

    Grade:
      type: object
      properties:
        id:          { type: integer }
        school_id:   { type: integer }
        name:        { type: string, example: "Grade 7" }
        order:       { type: integer }
        description: { type: string, nullable: true }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    Room:
      type: object
      properties:
        id:           { type: integer }
        school_id:    { type: integer }
        name:         { type: string, example: "Room 101" }
        code:         { type: string, nullable: true }
        capacity:     { type: integer }
        is_available: { type: boolean }
        created_at:   { type: string, format: date-time }
        updated_at:   { type: string, format: date-time }

    Classroom:
      type: object
      properties:
        id:            { type: integer }
        school_id:     { type: integer }
        grade_id:      { type: integer }
        room_id:       { type: integer, nullable: true }
        teacher_id:    { type: integer, nullable: true }
        name:          { type: string, example: "7A" }
        section:       { type: string, nullable: true }
        capacity:      { type: integer }
        academic_year: { type: string, example: "2025-2026" }
        is_active:     { type: boolean }
        grade:         { $ref: '#/components/schemas/Grade' }
        teacher:       { $ref: '#/components/schemas/User' }
        room:          { $ref: '#/components/schemas/Room' }
        students_count: { type: integer }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }

    TimetableSlot:
      type: object
      properties:
        id:            { type: integer }
        school_id:     { type: integer }
        classroom_id:  { type: integer }
        teacher_id:    { type: integer }
        room_id:       { type: integer, nullable: true }
        subject:       { type: string, example: "Mathematics" }
        day_of_week:
          type: integer
          minimum: 1
          maximum: 7
          description: "1=Monday … 7=Sunday"
        start_time:    { type: string, example: "08:00" }
        end_time:      { type: string, example: "09:00" }
        valid_from:    { type: string, format: date, nullable: true }
        valid_to:      { type: string, format: date, nullable: true }
        classroom:     { $ref: '#/components/schemas/Classroom' }
        teacher:       { $ref: '#/components/schemas/User' }
        room:          { $ref: '#/components/schemas/Room' }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }

    File:
      type: object
      properties:
        id:            { type: integer }
        school_id:     { type: integer }
        uploaded_by:   { type: integer }
        grade_id:      { type: integer, nullable: true }
        classroom_id:  { type: integer, nullable: true }
        title:         { type: string }
        description:   { type: string, nullable: true }
        visibility:
          type: string
          enum: [class, grade, school]
        disk:          { type: string }
        path:          { type: string }
        mime_type:     { type: string, nullable: true }
        file_type:     { type: string, nullable: true, example: "pdf" }
        size_bytes:    { type: integer }
        uploader:      { $ref: '#/components/schemas/User' }
        grade:         { $ref: '#/components/schemas/Grade' }
        classroom:     { $ref: '#/components/schemas/Classroom' }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }

    Payment:
      type: object
      properties:
        id:                  { type: integer }
        school_id:           { type: integer }
        student_id:          { type: integer }
        student_profile_id:  { type: integer }
        recorded_by:         { type: integer }
        year:                { type: integer, example: 2025 }
        month:               { type: integer, minimum: 1, maximum: 12 }
        amount:              { type: number, format: float }
        status:
          type: string
          enum: [paid, unpaid, partial, waived]
        notes:               { type: string, nullable: true }
        paid_at:             { type: string, format: date, nullable: true }
        student_profile:     { $ref: '#/components/schemas/StudentProfile' }
        recorded_by_user:    { $ref: '#/components/schemas/User' }
        created_at:          { type: string, format: date-time }
        updated_at:          { type: string, format: date-time }

    ActivityLog:
      type: object
      properties:
        id:          { type: integer }
        school_id:   { type: integer, nullable: true }
        user_id:     { type: integer, nullable: true }
        action:      { type: string, example: "user.login" }
        description: { type: string }
        ip_address:  { type: string, nullable: true }
        user_agent:  { type: string, nullable: true }
        metadata:    { type: object, nullable: true }
        created_at:  { type: string, format: date-time }

    AuthToken:
      type: object
      properties:
        user:  { $ref: '#/components/schemas/User' }
        token: { type: string, example: "1|abcdef..." }

    SchoolDashboard:
      type: object
      properties:
        counts:
          type: object
          properties:
            students:   { type: integer }
            teachers:   { type: integer }
            admins:     { type: integer }
            grades:     { type: integer }
            classrooms: { type: integer }
        payments_this_month:
          type: object
          properties:
            paid:    { type: integer }
            unpaid:  { type: integer }
            partial: { type: integer }
            revenue: { type: number }
        files:
          type: object
          properties:
            total:    { type: integer }
            total_mb: { type: number }
            by_grade: { type: array, items: { type: object } }
        activity:
          type: object
          properties:
            active_users_24h: { type: integer }
            active_users_7d:  { type: integer }
        plan:           { $ref: '#/components/schemas/SubscriptionPlan' }
        school_status:  { type: string }
        trial_ends_at:  { type: string, format: date-time, nullable: true }

    SystemDashboard:
      type: object
      properties:
        schools_by_status: { type: object }
        schools_by_tier:   { type: object }
        total_schools:     { type: integer }
        users_by_role:     { type: object }
        total_users:       { type: integer }
        active_users_24h:  { type: integer }
        active_users_7d:   { type: integer }

  # ── Reusable responses ─────────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: "Unauthenticated."
            code: "UNAUTHENTICATED"
    Forbidden:
      description: Insufficient role / tenant mismatch
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: "Forbidden."
            code: "FORBIDDEN"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: "Resource not found."
            code: "NOT_FOUND"
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

# ── Global security (overridden on public endpoints) ─────────────────────────
security:
  - bearerAuth: []

paths:

  # ════════════════════════════════════════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════════════════════════════════════════

  /auth/register-school:
    post:
      tags: [Auth]
      summary: Register a new school (public)
      description: |
        Creates a new school with a 14-day trial and a `school_owner` user in one atomic call.
        **No authentication required.**
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [school_name, school_email, owner_name, owner_email, password, password_confirmation]
              properties:
                school_name:           { type: string, example: "Springfield High" }
                school_email:          { type: string, format: email }
                owner_name:            { type: string, example: "John Smith" }
                owner_email:           { type: string, format: email }
                password:              { type: string, format: password, minLength: 8 }
                password_confirmation: { type: string, format: password }
                phone:                 { type: string, nullable: true }
                country:               { type: string, nullable: true }
      responses:
        "201":
          description: School & owner created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:   { $ref: '#/components/schemas/User' }
                  school: { $ref: '#/components/schemas/School' }
                  token:  { type: string }
        "422": { $ref: '#/components/responses/ValidationError' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login (all roles, public)
      description: Returns a Sanctum bearer token. Previous tokens are invalidated.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email }
                password: { type: string, format: password }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        "403":
          description: Account or school is inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422": { $ref: '#/components/responses/ValidationError' }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Send password reset email (public)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Reset link sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        "422": { $ref: '#/components/responses/ValidationError' }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using email token (public)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, email, password, password_confirmation]
              properties:
                token:                 { type: string }
                email:                 { type: string, format: email }
                password:              { type: string, format: password, minLength: 8 }
                password_confirmation: { type: string, format: password }
      responses:
        "200":
          description: Password reset successfully
        "422": { $ref: '#/components/responses/ValidationError' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke current token)
      description: "**Roles:** all authenticated"
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /auth/me:
    get:
      tags: [Profile]
      summary: Get authenticated user profile
      description: "**Roles:** all authenticated"
      responses:
        "200":
          description: User with school and roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401": { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [Profile]
      summary: Update own profile (name, phone, password)
      description: "**Roles:** all authenticated"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:             { type: string }
                phone:            { type: string, nullable: true }
                current_password: { type: string, format: password }
                password:         { type: string, format: password, minLength: 8 }
                password_confirmation: { type: string, format: password }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "422": { $ref: '#/components/responses/ValidationError' }

  # ════════════════════════════════════════════════════════════════════════════
  # SYSTEM ADMIN
  # ════════════════════════════════════════════════════════════════════════════

  /system/dashboard:
    get:
      tags: [System – Dashboard]
      summary: Platform-wide dashboard statistics
      description: "**Roles:** `system_admin`"
      responses:
        "200":
          description: Global statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemDashboard'
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /system/stats:
    get:
      tags: [System – Dashboard]
      summary: Quick global counts (legacy)
      description: "**Roles:** `system_admin`"
      responses:
        "200":
          description: Counts of schools and users
          content:
            application/json:
              schema:
                type: object
                properties:
                  schools:        { type: integer }
                  active_schools: { type: integer }
                  trial_schools:  { type: integer }
                  suspended:      { type: integer }
                  total_users:    { type: integer }
                  total_students: { type: integer }
                  total_teachers: { type: integer }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /system/schools:
    get:
      tags: [System – Schools]
      summary: List all schools
      description: "**Roles:** `system_admin`"
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, suspended, trial, cancelled]
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated schools
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/School' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /system/schools/{school}:
    parameters:
      - name: school
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [System – Schools]
      summary: Get school details
      description: "**Roles:** `system_admin`"
      responses:
        "200":
          description: School with plan
          content:
            application/json:
              schema: { $ref: '#/components/schemas/School' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [System – Schools]
      summary: Update school (status, tier, plan, dates)
      description: "**Roles:** `system_admin`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:                 { type: string }
                email:                { type: string, format: email }
                phone:                { type: string, nullable: true }
                address:              { type: string, nullable: true }
                status:
                  type: string
                  enum: [active, suspended, trial, cancelled]
                subscription_tier:
                  type: string
                  enum: [tier1, tier2, tier3, trial]
                subscription_plan_id: { type: integer, nullable: true }
                trial_ends_at:        { type: string, format: date-time, nullable: true }
                subscription_ends_at: { type: string, format: date-time, nullable: true }
      responses:
        "200":
          description: Updated school
          content:
            application/json:
              schema: { $ref: '#/components/schemas/School' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "422": { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [System – Schools]
      summary: Soft-delete a school
      description: "**Roles:** `system_admin`"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }

  /system/schools/{school}/subscription:
    parameters:
      - name: school
        in: path
        required: true
        schema: { type: integer }
    patch:
      tags: [System – Schools]
      summary: Change school subscription tier/plan
      description: "**Roles:** `system_admin`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscription_tier]
              properties:
                subscription_tier:
                  type: string
                  enum: [tier1, tier2, tier3, trial]
                subscription_plan_id:  { type: integer, nullable: true }
                subscription_ends_at:  { type: string, format: date-time, nullable: true }
      responses:
        "200":
          description: Updated school
          content:
            application/json:
              schema: { $ref: '#/components/schemas/School' }
        "422": { $ref: '#/components/responses/ValidationError' }

  /system/plans:
    get:
      tags: [System – Subscription Plans]
      summary: List all subscription plans
      description: "**Roles:** `system_admin`"
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SubscriptionPlan' }
    post:
      tags: [System – Subscription Plans]
      summary: Create a subscription plan
      description: "**Roles:** `system_admin`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug, price_monthly, price_yearly]
              properties:
                name:             { type: string }
                slug:             { type: string }
                description:      { type: string, nullable: true }
                max_students:     { type: integer, nullable: true }
                max_teachers:     { type: integer, nullable: true }
                max_classes:      { type: integer, nullable: true }
                storage_limit_mb: { type: integer }
                price_monthly:    { type: number }
                price_yearly:     { type: number }
                is_active:        { type: boolean }
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubscriptionPlan' }
        "422": { $ref: '#/components/responses/ValidationError' }

  /system/plans/{subscriptionPlan}:
    parameters:
      - name: subscriptionPlan
        in: path
        required: true
        schema: { type: integer }
    patch:
      tags: [System – Subscription Plans]
      summary: Update a subscription plan
      description: "**Roles:** `system_admin`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:             { type: string }
                description:      { type: string, nullable: true }
                max_students:     { type: integer, nullable: true }
                max_teachers:     { type: integer, nullable: true }
                max_classes:      { type: integer, nullable: true }
                storage_limit_mb: { type: integer }
                price_monthly:    { type: number }
                price_yearly:     { type: number }
                is_active:        { type: boolean }
      responses:
        "200":
          description: Updated plan
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubscriptionPlan' }
        "422": { $ref: '#/components/responses/ValidationError' }

  /system/activity-logs:
    get:
      tags: [System – Activity Logs]
      summary: Platform-wide activity log
      description: "**Roles:** `system_admin`"
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - name: school_id
          in: query
          schema: { type: integer }
        - name: action
          in: query
          schema: { type: string, example: "user.login" }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Paginated activity logs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/ActivityLog' }

  # ════════════════════════════════════════════════════════════════════════════
  # SCHOOL PROFILE
  # ════════════════════════════════════════════════════════════════════════════

  /school:
    get:
      tags: [School – Profile]
      summary: Get current school profile
      description: "**Roles:** `school_owner`, `admin`"
      parameters:
        - $ref: '#/components/parameters/XSchoolId'
      responses:
        "200":
          description: School with plan
          content:
            application/json:
              schema: { $ref: '#/components/schemas/School' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
    patch:
      tags: [School – Profile]
      summary: Update current school profile
      description: "**Roles:** `school_owner`, `admin`"
      parameters:
        - $ref: '#/components/parameters/XSchoolId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:     { type: string }
                email:    { type: string, format: email }
                phone:    { type: string, nullable: true }
                address:  { type: string, nullable: true }
                city:     { type: string, nullable: true }
                country:  { type: string, nullable: true }
                timezone: { type: string }
      responses:
        "200":
          description: Updated school
          content:
            application/json:
              schema: { $ref: '#/components/schemas/School' }
        "422": { $ref: '#/components/responses/ValidationError' }

  /school/dashboard:
    get:
      tags: [School – Dashboard]
      summary: School-level statistics
      description: "**Roles:** `school_owner`, `admin`"
      parameters:
        - $ref: '#/components/parameters/XSchoolId'
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SchoolDashboard' }

  /school/activity-logs:
    get:
      tags: [School – Activity Logs]
      summary: School-scoped activity log
      description: "**Roles:** `school_owner`, `admin`"
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - name: action
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Paginated logs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/ActivityLog' }

  # ════════════════════════════════════════════════════════════════════════════
  # USERS
  # ════════════════════════════════════════════════════════════════════════════

  /school/users:
    get:
      tags: [School – Users]
      summary: List users in current school
      description: "**Roles:** `school_owner`, `admin`"
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/XSchoolId'
        - name: role
          in: query
          schema:
            type: string
            enum: [admin, teacher, student]
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/User' }
    post:
      tags: [School – Users]
      summary: Create user in current school
      description: |
        **Roles:** `school_owner`, `admin`

        - Allowed roles to assign: `admin`, `teacher`, `student`
        - Creating a `student` automatically creates a linked `StudentProfile`
        - Respects subscription plan limits (max_students, max_teachers, max_admins)
      parameters:
        - $ref: '#/components/parameters/XSchoolId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, role]
              properties:
                name:               { type: string }
                email:              { type: string, format: email }
                phone:              { type: string, nullable: true }
                password:           { type: string, format: password, minLength: 8 }
                role:               { type: string, enum: [admin, teacher, student] }
                enrollment_number:  { type: string, description: "Required when role=student" }
                date_of_birth:      { type: string, format: date, nullable: true }
                guardian_name:      { type: string, nullable: true }
                guardian_phone:     { type: string, nullable: true }
                guardian_email:     { type: string, format: email, nullable: true }
                address:            { type: string, nullable: true }
      responses:
        "201":
          description: User created (with StudentProfile when role=student)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        "422": { $ref: '#/components/responses/ValidationError' }

  /school/users/{user}:
    parameters:
      - name: user
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [School – Users]
      summary: Get user details
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: User with roles and classes
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [School – Users]
      summary: Update user (name, email, role, active status)
      description: "**Roles:** `school_owner`, `admin`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:      { type: string }
                email:     { type: string, format: email }
                phone:     { type: string, nullable: true }
                password:  { type: string, format: password, minLength: 8 }
                is_active: { type: boolean }
                role:      { type: string, enum: [admin, teacher, student] }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        "422": { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [School – Users]
      summary: Soft-delete user
      description: |
        **Roles:** `school_owner`, `admin`

        Cannot delete `school_owner`.
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        "403": { $ref: '#/components/responses/Forbidden' }

  # ════════════════════════════════════════════════════════════════════════════
  # STUDENT PROFILES
  # ════════════════════════════════════════════════════════════════════════════

  /school/students:
    get:
      tags: [School – Students]
      summary: List student profiles
      description: "**Roles:** `school_owner`, `admin`"
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, graduated, suspended]
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated student profiles
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/StudentProfile' }

  /school/students/{student}:
    parameters:
      - name: student
        in: path
        required: true
        description: StudentProfile ID
        schema: { type: integer }
    get:
      tags: [School – Students]
      summary: Get student profile with classes and payments
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: Student profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StudentProfile' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [School – Students]
      summary: Update student profile data
      description: "**Roles:** `school_owner`, `admin`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date_of_birth:  { type: string, format: date, nullable: true }
                guardian_name:  { type: string, nullable: true }
                guardian_phone: { type: string, nullable: true }
                guardian_email: { type: string, format: email, nullable: true }
                address:        { type: string, nullable: true }
                status:
                  type: string
                  enum: [active, inactive, graduated, suspended]
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StudentProfile' }

  /school/students/{student}/classes:
    parameters:
      - name: student
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [School – Students]
      summary: Get classrooms a student is enrolled in
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: List of classrooms
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Classroom' }

  /school/students/{student}/payments:
    parameters:
      - name: student
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [School – Students]
      summary: Monthly payment summary for a student
      description: "**Roles:** `school_owner`, `admin`"
      parameters:
        - name: year
          in: query
          schema: { type: integer, example: 2025 }
      responses:
        "200":
          description: Payment records
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Payment' }

  # ════════════════════════════════════════════════════════════════════════════
  # GRADES
  # ════════════════════════════════════════════════════════════════════════════

  /school/grades:
    get:
      tags: [School – Grades]
      summary: List grades with classroom counts
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: Grades ordered by `order`
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Grade' }
    post:
      tags: [School – Grades]
      summary: Create a grade
      description: "**Roles:** `school_owner`, `admin`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:        { type: string, example: "Grade 7" }
                order:       { type: integer, default: 0 }
                description: { type: string, nullable: true }
      responses:
        "201":
          description: Grade created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Grade' }
        "422": { $ref: '#/components/responses/ValidationError' }

  /school/grades/{grade}:
    parameters:
      - name: grade
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [School – Grades]
      summary: Get grade with classrooms
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: Grade with classrooms
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Grade' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [School – Grades]
      summary: Update grade
      description: "**Roles:** `school_owner`, `admin`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:        { type: string }
                order:       { type: integer }
                description: { type: string, nullable: true }
      responses:
        "200":
          description: Updated grade
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Grade' }
    delete:
      tags: [School – Grades]
      summary: Delete grade
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }

  # ════════════════════════════════════════════════════════════════════════════
  # ROOMS
  # ════════════════════════════════════════════════════════════════════════════

  /school/rooms:
    get:
      tags: [School – Rooms]
      summary: List rooms
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: Rooms ordered by name
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Room' }
    post:
      tags: [School – Rooms]
      summary: Create a room
      description: "**Roles:** `school_owner`, `admin`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:         { type: string, example: "Room 101" }
                code:         { type: string, nullable: true }
                capacity:     { type: integer, default: 30 }
                is_available: { type: boolean, default: true }
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Room' }
        "422": { $ref: '#/components/responses/ValidationError' }

  /school/rooms/{room}:
    parameters:
      - name: room
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [School – Rooms]
      summary: Get room
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: Room
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Room' }
    patch:
      tags: [School – Rooms]
      summary: Update room
      description: "**Roles:** `school_owner`, `admin`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:         { type: string }
                code:         { type: string, nullable: true }
                capacity:     { type: integer }
                is_available: { type: boolean }
      responses:
        "200":
          description: Updated room
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Room' }
    delete:
      tags: [School – Rooms]
      summary: Delete room
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: Deleted

  # ════════════════════════════════════════════════════════════════════════════
  # CLASSES (CLASSROOMS)
  # ════════════════════════════════════════════════════════════════════════════

  /school/classes:
    get:
      tags: [School – Classes]
      summary: List classrooms
      description: "**Roles:** `school_owner`, `admin`"
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - name: grade_id
          in: query
          schema: { type: integer }
        - name: academic_year
          in: query
          schema: { type: string, example: "2025-2026" }
      responses:
        "200":
          description: Paginated classrooms
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Classroom' }
    post:
      tags: [School – Classes]
      summary: Create a classroom
      description: |
        **Roles:** `school_owner`, `admin`

        Respects `max_classes` subscription limit.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [grade_id, name, academic_year]
              properties:
                grade_id:      { type: integer }
                room_id:       { type: integer, nullable: true }
                teacher_id:    { type: integer, nullable: true }
                name:          { type: string, example: "7A" }
                section:       { type: string, nullable: true }
                capacity:      { type: integer, default: 30 }
                academic_year: { type: string, example: "2025-2026" }
      responses:
        "201":
          description: Classroom created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Classroom' }
        "422": { $ref: '#/components/responses/ValidationError' }

  /school/classes/{classroom}:
    parameters:
      - name: classroom
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [School – Classes]
      summary: Get classroom with students and timetable
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: Classroom detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Classroom' }
    patch:
      tags: [School – Classes]
      summary: Update classroom
      description: "**Roles:** `school_owner`, `admin`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                room_id:       { type: integer, nullable: true }
                teacher_id:    { type: integer, nullable: true }
                name:          { type: string }
                section:       { type: string, nullable: true }
                capacity:      { type: integer }
                academic_year: { type: string }
                is_active:     { type: boolean }
      responses:
        "200":
          description: Updated classroom
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Classroom' }
    delete:
      tags: [School – Classes]
      summary: Delete classroom
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: Deleted

  /school/classes/{classroom}/enroll:
    parameters:
      - name: classroom
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [School – Classes]
      summary: Enroll a student in a classroom
      description: "**Roles:** `school_owner`, `admin`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [student_id, enrolled_at]
              properties:
                student_id:   { type: integer, description: "User ID of the student" }
                enrolled_at:  { type: string, format: date }
      responses:
        "200":
          description: Enrolled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        "422": { $ref: '#/components/responses/ValidationError' }

  /school/classes/{classroom}/students/{student}:
    parameters:
      - name: classroom
        in: path
        required: true
        schema: { type: integer }
      - name: student
        in: path
        required: true
        schema: { type: integer }
    delete:
      tags: [School – Classes]
      summary: Remove student from classroom
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: Removed

  /school/classes/{classroom}/students:
    parameters:
      - name: classroom
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [School – Classes]
      summary: List students enrolled in a classroom
      description: "**Roles:** `school_owner`, `admin`, `teacher`"
      parameters:
        - $ref: '#/components/parameters/PageParam'
      responses:
        "200":
          description: Paginated enrolled students
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/User' }

  /school/classes/{classroom}/timetable:
    parameters:
      - name: classroom
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [School – Timetable]
      summary: Get timetable for a specific classroom
      description: "**Roles:** `school_owner`, `admin`, `teacher`"
      responses:
        "200":
          description: Timetable slots ordered by day and time
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TimetableSlot' }

  # ════════════════════════════════════════════════════════════════════════════
  # TIMETABLE
  # ════════════════════════════════════════════════════════════════════════════

  /school/timetable:
    get:
      tags: [School – Timetable]
      summary: List timetable slots
      description: "**Roles:** `school_owner`, `admin`"
      parameters:
        - name: classroom_id
          in: query
          schema: { type: integer }
        - name: teacher_id
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Timetable slots
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TimetableSlot' }
    post:
      tags: [School – Timetable]
      summary: Create a timetable slot
      description: |
        **Roles:** `school_owner`, `admin`

        DB-level unique constraints prevent double-booking rooms and teachers
        on the same day/time. A 422 with a duplicate key error is returned on conflict.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [classroom_id, teacher_id, subject, day_of_week, start_time, end_time]
              properties:
                classroom_id: { type: integer }
                teacher_id:   { type: integer }
                room_id:      { type: integer, nullable: true }
                subject:      { type: string, example: "Mathematics" }
                day_of_week:
                  type: integer
                  minimum: 1
                  maximum: 7
                  description: "1=Mon, 2=Tue, … 7=Sun"
                start_time:   { type: string, example: "08:00" }
                end_time:     { type: string, example: "09:00" }
                valid_from:   { type: string, format: date, nullable: true }
                valid_to:     { type: string, format: date, nullable: true }
      responses:
        "201":
          description: Slot created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TimetableSlot' }
        "422": { $ref: '#/components/responses/ValidationError' }

  /school/timetable/{timetable}:
    parameters:
      - name: timetable
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [School – Timetable]
      summary: Get timetable slot
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: Slot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TimetableSlot' }
    patch:
      tags: [School – Timetable]
      summary: Update timetable slot
      description: "**Roles:** `school_owner`, `admin`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                teacher_id:  { type: integer }
                room_id:     { type: integer, nullable: true }
                subject:     { type: string }
                day_of_week: { type: integer, minimum: 1, maximum: 7 }
                start_time:  { type: string }
                end_time:    { type: string }
                valid_from:  { type: string, format: date, nullable: true }
                valid_to:    { type: string, format: date, nullable: true }
      responses:
        "200":
          description: Updated slot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TimetableSlot' }
    delete:
      tags: [School – Timetable]
      summary: Delete timetable slot
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: Deleted

  /school/my-timetable:
    get:
      tags: [School – Timetable]
      summary: Get own timetable (teacher or student)
      description: |
        **Roles:** `teacher`, `student`

        - Teacher: all slots where `teacher_id = auth user`
        - Student: all slots for classrooms they are enrolled in
      responses:
        "200":
          description: Timetable slots
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TimetableSlot' }

  /school/teachers/{teacher}/timetable:
    parameters:
      - name: teacher
        in: path
        required: true
        description: Teacher User ID
        schema: { type: integer }
    get:
      tags: [School – Timetable]
      summary: Get timetable for a specific teacher
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: Timetable slots
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TimetableSlot' }

  # ════════════════════════════════════════════════════════════════════════════
  # FILES
  # ════════════════════════════════════════════════════════════════════════════

  /school/files:
    get:
      tags: [School – Files]
      summary: List files (access-filtered by role)
      description: |
        **Roles:** `school_owner`, `admin`, `teacher`, `student`

        - Admin/Owner: all school files
        - Teacher: files for their classes, their grade, or school-wide + own uploads
        - Student: files for their enrolled classes, their grade, or school-wide
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - name: grade_id
          in: query
          schema: { type: integer }
        - name: classroom_id
          in: query
          schema: { type: integer }
        - name: visibility
          in: query
          schema:
            type: string
            enum: [class, grade, school]
      responses:
        "200":
          description: Paginated files
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/File' }
    post:
      tags: [School – Files]
      summary: Upload a file
      description: |
        **Roles:** `school_owner`, `admin`, `teacher`

        Multipart form upload. Storage limit is checked against the subscription plan.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, title]
              properties:
                file:
                  type: string
                  format: binary
                  description: Max 100 MB
                title:       { type: string }
                description: { type: string, nullable: true }
                grade_id:    { type: integer, nullable: true }
                classroom_id: { type: integer, nullable: true }
                visibility:
                  type: string
                  enum: [class, grade, school]
                  default: class
      responses:
        "201":
          description: File uploaded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/File' }
        "422": { $ref: '#/components/responses/ValidationError' }

  /school/files/{file}:
    parameters:
      - name: file
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [School – Files]
      summary: Get file metadata
      description: |
        **Roles:** `school_owner`, `admin`, `teacher`, `student`

        Access is checked via `FilePolicy::view`.
      responses:
        "200":
          description: File metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/File' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [School – Files]
      summary: Update file metadata
      description: |
        **Roles:** `school_owner`, `admin` (any file) · `teacher`, `student` (own uploads only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:        { type: string }
                description:  { type: string, nullable: true }
                grade_id:     { type: integer, nullable: true }
                classroom_id: { type: integer, nullable: true }
                visibility:
                  type: string
                  enum: [class, grade, school]
      responses:
        "200":
          description: Updated file
          content:
            application/json:
              schema: { $ref: '#/components/schemas/File' }
        "403": { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [School – Files]
      summary: Delete file
      description: |
        **Roles:** `school_owner`, `admin` (any file) · `teacher` (own uploads only)

        Also removes the file from disk.
      responses:
        "200":
          description: Deleted
        "403": { $ref: '#/components/responses/Forbidden' }

  /school/files/{file}/download:
    parameters:
      - name: file
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [School – Files]
      summary: Stream file download
      description: |
        **Roles:** `school_owner`, `admin`, `teacher`, `student`

        Returns a direct `Content-Disposition: attachment` binary stream.
      responses:
        "200":
          description: Binary file stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ════════════════════════════════════════════════════════════════════════════
  # PAYMENTS
  # ════════════════════════════════════════════════════════════════════════════

  /school/payments:
    get:
      tags: [School – Payments]
      summary: List payment records
      description: "**Roles:** `school_owner`, `admin`"
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - name: student_profile_id
          in: query
          schema: { type: integer }
        - name: year
          in: query
          schema: { type: integer, example: 2025 }
        - name: month
          in: query
          schema: { type: integer, minimum: 1, maximum: 12 }
        - name: status
          in: query
          schema:
            type: string
            enum: [paid, unpaid, partial, waived]
      responses:
        "200":
          description: Paginated payments
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Payment' }
    post:
      tags: [School – Payments]
      summary: Create or update monthly payment record
      description: |
        **Roles:** `school_owner`, `admin`

        Uses `updateOrCreate` on `(school_id, student_profile_id, year, month)` — idempotent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [student_profile_id, year, month, amount, status]
              properties:
                student_profile_id: { type: integer }
                year:    { type: integer, example: 2025 }
                month:   { type: integer, minimum: 1, maximum: 12 }
                amount:  { type: number, example: 150.00 }
                status:
                  type: string
                  enum: [paid, unpaid, partial, waived]
                notes:   { type: string, nullable: true }
                paid_at: { type: string, format: date, nullable: true }
      responses:
        "201":
          description: Payment created/updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
        "422": { $ref: '#/components/responses/ValidationError' }

  /school/payments/{payment}:
    parameters:
      - name: payment
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [School – Payments]
      summary: Get payment record
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: Payment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
    patch:
      tags: [School – Payments]
      summary: Update payment record
      description: "**Roles:** `school_owner`, `admin`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:  { type: number }
                status:
                  type: string
                  enum: [paid, unpaid, partial, waived]
                notes:   { type: string, nullable: true }
                paid_at: { type: string, format: date, nullable: true }
      responses:
        "200":
          description: Updated payment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
    delete:
      tags: [School – Payments]
      summary: Delete payment record
      description: "**Roles:** `school_owner`, `admin`"
      responses:
        "200":
          description: Deleted
